<!-- SJPG Branding Snippet -->
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#A67C8A">

<style>
  :root {
    --sjpg-charcoal: #2F3437;
    --sjpg-mauve: #A67C8A;
    --sjpg-blush: #D9B8C4;
    --sjpg-sage: #A8B5A2;
    --sjpg-champagne: #E9DFD3;
  }

  .sjpg-brand {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: var(--sjpg-charcoal);
    text-decoration: none;
    font-family: Arial, Helvetica, sans-serif;
  }

  .sjpg-brand__logo {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    object-fit: cover;
  }

  .sjpg-brand__name {
    display: block;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .sjpg-brand__tagline {
    display: block;
    color: var(--sjpg-mauve);
    font-size: 0.88rem;
  }
</style>

<a class="sjpg-brand" href="/">
  <img class="sjpg-brand__logo" src="/logo-icon.png" alt="SJPG logo">
  <span>
    <span class="sjpg-brand__name">Sarah Jane Galido</span>
    <span class="sjpg-brand__tagline">Virtual Assistant &amp; Social Media Manager</span>
  </span>
</a>
