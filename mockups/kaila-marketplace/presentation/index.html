post requests.&quot;, &quot;Measure provider willingness to join and respond.&quot;, &quot;Track requests, offers, completed or strongly matched jobs, response time, and rating behavior.&quot;, &quot;Look for categories with enough demand and provider availability.&quot;, &quot;Use evidence to decide whether to build, narrow, redesign, or pause.&quot;]}, {&quot;section&quot;: &quot;03 Market Validation and Feasibility Study&quot;, &quot;title&quot;: &quot;Go / No-Go Criteria&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Decision&quot;, &quot;Indicators&quot;], &quot;rows&quot;: [[&quot;Proceed to MVP&quot;, &quot;Clients post real requests; providers respond; at least 15 jobs are completed or strongly matched; ratings behavior is acceptable.&quot;], [&quot;Narrow scope&quot;, &quot;Only 1 to 2 categories show strong demand; some categories have weak response; clients need help describing jobs.&quot;], [&quot;Pause or redesign&quot;, &quot;Providers refuse to participate, clients will not post requests, trust barriers are too high, or operations cannot support matching.&quot;]]}}, {&quot;section&quot;: &quot;03 Market Validation and Feasibility Study&quot;, &quot;title&quot;: &quot;Feasibility Notes&quot;, &quot;body&quot;: [&quot;Technical feasibility is high for a basic web MVP using common web technologies.&quot;, &quot;Operational feasibility depends on provider recruitment, response discipline, support, and dispute handling.&quot;, &quot;Market feasibility depends on whether people switch from informal referrals to a structured request and offer flow.&quot;, &quot;Financial feasibility should be tested after usage and trust are proven.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Provider Recruitment Principle&quot;, &quot;body&quot;: [&quot;KAILA is a two-sided marketplace, but the supply side must be built first.&quot;, &quot;Clients will only trust the platform if there are enough relevant, responsive, and credible providers.&quot;, &quot;Provider recruitment is the first operational priority.&quot;, &quot;Early provider density should focus on urgent and high-frequency categories.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Target Provider Groups&quot;, &quot;body&quot;: [&quot;Home-based appliance repair technicians.&quot;, &quot;Electricians and plumbers who accept household jobs.&quot;, &quot;Motorcycle mechanics and small engine repair workers.&quot;, &quot;Computer repair technicians and software troubleshooters.&quot;, &quot;Carpenters, welders, painters, and general maintenance workers.&quot;, &quot;Graphic designers, layout artists, tarpaulin designers, and digital freelancers.&quot;, &quot;Cleaning, gardening, errands, hauling, manpower providers, and small service shops.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Recruitment Channels&quot;, &quot;body&quot;: [&quot;Personal network: friends, neighbors, relatives, classmates, local contacts.&quot;, &quot;Facebook search: service posts, buy-and-sell groups, marketplace posts, pages of local technicians.&quot;, &quot;Field visits: repair shops, hardware stores, electronics stores, motorcycle shops, computer shops.&quot;, &quot;Community referrals: barangay contacts, homeowners, stores, alumni, churches, and community groups.&quot;, &quot;Provider-to-provider referrals: ask every provider to recommend two skilled workers.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Provider Pitch Script&quot;, &quot;body&quot;: [&quot;Simple version: We are building KAILA, a local platform that helps people find trusted workers.&quot;, &quot;Many clients ask online if anyone knows a plumber, electrician, technician, mechanic, or designer.&quot;, &quot;We want to list reliable providers so clients can find you when they need your service.&quot;, &quot;The pilot is free. You can accept or decline requests, and you can give your own offer.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Provider Onboarding Checklist&quot;, &quot;body&quot;: [&quot;Full name and display name.&quot;, &quot;Contact number and preferred channel.&quot;, &quot;Service categories, specific skills, and years of experience.&quot;, &quot;Coverage area, travel limits, availability, and emergency availability.&quot;, &quot;Sample price range or minimum service fee.&quot;, &quot;Photos of previous work, tools, or shop.&quot;, &quot;Optional certificates, permit, training proof, valid ID, and consent to be contacted during pilot.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Provider Quality Levels&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Level&quot;, &quot;Meaning&quot;], &quot;rows&quot;: [[&quot;1 - Listed&quot;, &quot;Basic profile information and selected service categories.&quot;], [&quot;2 - Identity Verified&quot;, &quot;Submitted ID and passed basic identity check.&quot;], [&quot;3 - Work Verified&quot;, &quot;Submitted work samples, references, or completed pilot jobs.&quot;], [&quot;4 - Top Rated&quot;, &quot;Strong ratings, completed jobs, fast response, and low dispute rate.&quot;], [&quot;5 - Certified or Business Verified&quot;, &quot;Optional certificate, training credential, shop, permit, or recognized professional background.&quot;]]}}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Operational Rules for Providers&quot;, &quot;body&quot;: [&quot;Respond honestly and only accept jobs you can perform.&quot;, &quot;Do not change price unfairly after arrival unless job scope changes.&quot;, &quot;Communicate delays early.&quot;, &quot;Respect client property and privacy.&quot;, &quot;Do not harass, threaten, pressure clients, or bypass pilot tracking.&quot;, &quot;Ask the client to confirm job completion before leaving when possible.&quot;, &quot;Accept that ratings and reviews are part of the trust system.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Retention Strategy&quot;, &quot;body&quot;: [&quot;Give early providers a founding provider badge.&quot;, &quot;Share monthly performance summaries: requests received, offers sent, jobs completed, ratings.&quot;, &quot;Feature high-performing providers on the Facebook page.&quot;, &quot;Create category-based provider groups for updates and feedback.&quot;, &quot;Ask providers what jobs they want more of.&quot;, &quot;Avoid charging too early before providers feel real value.&quot;, &quot;Protect providers from abusive clients through two-way ratings.&quot;]}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Dispute Playbook&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Area&quot;, &quot;Details&quot;], &quot;rows&quot;: [[&quot;Common disputes&quot;, &quot;Provider no-show, client no-show, price change after arrival, poor quality work, property damage, payment disagreement, scope misunderstanding, rude communication.&quot;], [&quot;Evidence to collect&quot;, &quot;Original request, before/after photos or videos, chat messages, offer amount, agreed scope, completion confirmation, ratings, and complaint notes.&quot;], [&quot;Possible actions&quot;, &quot;No action, private warning, rating remains, account restriction, removal from verified status, suspension, or permanent ban for severe cases.&quot;]]}}, {&quot;section&quot;: &quot;04 Provider Recruitment and Operations Playbook&quot;, &quot;title&quot;: &quot;Provider Recruitment Targets&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Category&quot;, &quot;Minimum&quot;, &quot;Ideal&quot;, &quot;Reason&quot;], &quot;rows&quot;: [[&quot;Appliance repair&quot;, &quot;8&quot;, &quot;15&quot;, &quot;High household demand and urgent repair needs.&quot;], [&quot;Plumbing&quot;, &quot;6&quot;, &quot;12&quot;, &quot;Leak and clog problems require fast response.&quot;], [&quot;Electrical&quot;, &quot;6&quot;, &quot;12&quot;, &quot;Safety-sensitive and common household need.&quot;], [&quot;Computer repair&quot;, &quot;5&quot;, &quot;10&quot;, &quot;Strong fit with students, offices, and households.&quot;], [&quot;Mechanical / motorcycle&quot;, &quot;5&quot;, &quot;10&quot;, &quot;Common in local communities.&quot;], [&quot;Carpentry / home maintenance&quot;, &quot;5&quot;, &quot;10&quot;, &quot;Frequent small repair and improvement jobs.&quot;], [&quot;Graphic / digital services&quot;, &quot;5&quot;, &quot;10&quot;, &quot;Useful for local events, businesses, and students.&quot;], [&quot;General odd jobs&quot;, &quot;10&quot;, &quot;20&quot;, &quot;Flexible supply for miscellaneous needs.&quot;]]}}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;MVP Philosophy&quot;, &quot;body&quot;: [&quot;The MVP should prove marketplace behavior, not impress users with advanced technology.&quot;, &quot;It must be simple enough to build and operate, but complete enough to test request posting, provider response, offers, completed jobs, and ratings.&quot;, &quot;The MVP should support manual operations during pilot instead of forcing full automation too early.&quot;]}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;User Roles&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Role&quot;, &quot;Capabilities&quot;], &quot;rows&quot;: [[&quot;Guest&quot;, &quot;View basic landing page and public categories.&quot;], [&quot;Client&quot;, &quot;Create requests, receive offers, choose providers, chat, confirm completion, rate providers.&quot;], [&quot;Provider&quot;, &quot;Create profile, select categories, view matching requests, send offers, chat, update job status, rate clients.&quot;], [&quot;Admin&quot;, &quot;Manage categories, users, verification, requests, disputes, reports, and settings.&quot;], [&quot;Operations staff&quot;, &quot;Optional role for manual matching, onboarding, and support during pilot.&quot;]]}}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;Core Modules&quot;, &quot;body&quot;: [&quot;Authentication and profiles: register/login, role selection, photo, contact info, location, provider categories, verification status.&quot;, &quot;Service requests: category, subcategory, description, budget, urgency, location, media attachments, status.&quot;, &quot;Offer system: accept budget, counter-offer, schedule, notes, candidate comparison, provider selection.&quot;, &quot;Messaging: basic chat once offer or selection exists; system messages; admin review access for disputes.&quot;, &quot;Ratings and reviews: client rates provider and provider rates client with practical reminders.&quot;, &quot;Admin dashboard: users, requests, provider verification, categories, disputes, basic metrics.&quot;]}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;Urgency Levels and Job Status Flow&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Type&quot;, &quot;Values&quot;], &quot;rows&quot;: [[&quot;Urgency levels&quot;, &quot;Emergency, Today, This Week, Flexible, Scheduled.&quot;], [&quot;Job statuses&quot;, &quot;Draft, Posted, Offers Received, Accepted, In Progress, Completed by Provider, Confirmed by Client, Rated, Cancelled, Disputed.&quot;]]}}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;MVP Database Concept&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Entity&quot;, &quot;Purpose&quot;, &quot;Important Fields&quot;], &quot;rows&quot;: [[&quot;users&quot;, &quot;All accounts&quot;, &quot;id, name, phone, email, password, role, status, created_at&quot;], [&quot;provider_profiles&quot;, &quot;Provider profile&quot;, &quot;user_id, bio, years_experience, service_radius, availability, verification_level&quot;], [&quot;categories&quot;, &quot;Service categories&quot;, &quot;id, name, parent_id, description, active&quot;], [&quot;requests&quot;, &quot;Client requests&quot;, &quot;client_id, category_id, description, budget, urgency, location, status&quot;], [&quot;offers&quot;, &quot;Provider offers&quot;, &quot;request_id, provider_id, amount, notes, schedule, status&quot;], [&quot;jobs&quot;, &quot;Accepted work&quot;, &quot;request_id, provider_id, agreed_amount, status, started_at, completed_at&quot;], [&quot;messages&quot;, &quot;Chat messages&quot;, &quot;job_id/request_id, sender_id, message, created_at&quot;], [&quot;ratings&quot;, &quot;Two-way feedback&quot;, &quot;job_id, rater_id, ratee_id, score, review, rating_type&quot;], [&quot;verifications&quot;, &quot;Trust checks&quot;, &quot;user_id, type, status, reviewed_by, reviewed_at&quot;], [&quot;disputes&quot;, &quot;Issue tracking&quot;, &quot;job_id, complaint_by, reason, details, status, resolution&quot;]]}}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;Non-Functional Requirements&quot;, &quot;body&quot;: [&quot;Mobile-first responsive design.&quot;, &quot;Simple wording and Cebuano-friendly labels where useful.&quot;, &quot;Fast request posting with minimal required fields.&quot;, &quot;Safe file upload handling for photos/videos.&quot;, &quot;Basic moderation and admin review tools.&quot;, &quot;Avoid complex features until the marketplace behavior is proven.&quot;]}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;Do Not Build Yet&quot;, &quot;body&quot;: [&quot;In-app payments.&quot;, &quot;GPS live tracking.&quot;, &quot;Native mobile apps.&quot;, &quot;Complex AI matching.&quot;, &quot;Large-scale marketplace automation.&quot;, &quot;These can be considered only after validation proves the core behavior.&quot;]}, {&quot;section&quot;: &quot;05 MVP Functional Specification&quot;, &quot;title&quot;: &quot;Build Sequence&quot;, &quot;body&quot;: [&quot;Landing page and registration.&quot;, &quot;Provider profiles and categories.&quot;, &quot;Client request posting.&quot;, &quot;Provider request dashboard.&quot;, &quot;Offer and counter-offer system.&quot;, &quot;Client selection flow.&quot;, &quot;Basic messaging.&quot;, &quot;Completion and ratings.&quot;, &quot;Admin dashboard and reports.&quot;, &quot;Notifications after core flows work.&quot;]}, {&quot;section&quot;: &quot;06 Investor Style Pitch Deck&quot;, &quot;title&quot;: &quot;Pitch Narrative&quot;, &quot;body&quot;: [&quot;Everyday problem: when something breaks, people ask Naa moy kaila?&quot;, &quot;Opportunity: the problem is broken discovery, not lack of skilled people.&quot;, &quot;Solution: clients post service requests, providers respond with offers, and both sides build reputation.&quot;, &quot;Differentiation: local behavior, certified and experience-based providers, ratings, verification, completed job history, and operational discipline.&quot;]}, {&quot;section&quot;: &quot;06 Investor Style Pitch Deck&quot;, &quot;title&quot;: &quot;Pitch: Model, GTM, Validation, Ask&quot;, &quot;body&quot;: [&quot;Business model: free pilot, then premium visibility, lead credits, subscriptions, commissions, business accounts, and partnerships.&quot;, &quot;Go-to-market: recruit providers before client launch, start with one city or barangay cluster, use Facebook, referrals, community partners, and provider referrals.&quot;, &quot;Validation targets: interview 100 residents and 50 providers, recruit 50 providers, collect 30 real requests, complete or strongly match 15 jobs.&quot;, &quot;Co-founder ask: help validate demand, recruit provider network, design operations and trust systems, commit to clear roles and 90-day validation plan.&quot;]}, {&quot;section&quot;: &quot;07 Founders Agreement Discussion Draft&quot;, &quot;title&quot;: &quot;Important Note and Purpose&quot;, &quot;body&quot;: [&quot;The founders agreement document is not legal advice and should not be signed as a final agreement without lawyer review.&quot;, &quot;Purpose: make expectations clear before major effort, money, time, or intellectual property is committed.&quot;, &quot;Many early teams fail because roles, ownership, and decision rights are unclear.&quot;, &quot;The draft is a conversation guide for founder alignment.&quot;]}, {&quot;section&quot;: &quot;07 Founders Agreement Discussion Draft&quot;, &quot;title&quot;: &quot;Founding Principles&quot;, &quot;body&quot;: [&quot;Business validation comes before full app development.&quot;, &quot;No founder should be treated as merely a helper if expected to carry core responsibility.&quot;, &quot;Ownership should reflect contribution, risk, time commitment, and long-term responsibility.&quot;, &quot;Important decisions should be documented.&quot;, &quot;The team should protect trust, fairness, and transparency from the beginning.&quot;]}, {&quot;section&quot;: &quot;07 Founders Agreement Discussion Draft&quot;, &quot;title&quot;: &quot;Proposed Founder Roles&quot;, &quot;body&quot;: [&quot;Initiator / Product and Technology Lead: product vision, MVP design, development planning, technical direction.&quot;, &quot;Business and Strategy Lead: business model, partnerships, co-founder discussions, validation planning.&quot;, &quot;Operations Lead: provider onboarding, request handling, support, disputes, process design.&quot;, &quot;Provider Acquisition Lead: recruitment, verification, retention, provider feedback.&quot;, &quot;Marketing and Community Lead: client acquisition, content, local partnerships, community trust.&quot;, &quot;Finance and Administration Lead: financial model, budgets, records, compliance preparation.&quot;]}, {&quot;section&quot;: &quot;07 Founders Agreement Discussion Draft&quot;, &quot;title&quot;: &quot;Ownership, Vesting, and Decisions&quot;, &quot;body&quot;: [&quot;Ownership should be discussed based on role importance, contribution, risk, time commitment, capital, and long-term responsibility.&quot;, &quot;Recommended vesting concept: 4 years with a 1-year cliff, or a simpler milestone-based model for informal early teams.&quot;, &quot;Ordinary decisions may be decided by role owner.&quot;, &quot;Major financial, ownership, legal, strategic, or product-scope decisions should require founder approval.&quot;, &quot;Deadlocks should be resolved through documented discussion, adviser input, or pre-agreed voting rules.&quot;]}, {&quot;section&quot;: &quot;07 Founders Agreement Discussion Draft&quot;, &quot;title&quot;: &quot;Confidentiality, IP, and Founder Exit&quot;, &quot;body&quot;: [&quot;Founders should protect sensitive documents, provider lists, financial plans, user data, code, and internal strategy.&quot;, &quot;Code created for KAILA should belong to the business entity once formed, subject to agreed founder rights.&quot;, &quot;Brand assets, documents, provider records, user research, and product designs should be treated as KAILA assets.&quot;, &quot;Departure rules should define what happens to ownership, access, confidentiality, and unfinished responsibilities.&quot;]}, {&quot;section&quot;: &quot;08 Three-Year Financial Projection&quot;, &quot;title&quot;: &quot;Financial Model Assumptions&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Assumption&quot;, &quot;Base Case&quot;], &quot;rows&quot;: [[&quot;Starting active providers&quot;, &quot;50&quot;], [&quot;Starting monthly requests&quot;, &quot;30&quot;], [&quot;Monthly request growth&quot;, &quot;12%&quot;], [&quot;Completion rate&quot;, &quot;50%&quot;], [&quot;Average job value&quot;, &quot;PHP 700&quot;], [&quot;Commission rate&quot;, &quot;0% in Phase 1 free pilot&quot;], [&quot;Lead credit price&quot;, &quot;PHP 25&quot;], [&quot;Premium provider monthly fee&quot;, &quot;PHP 199&quot;], [&quot;Monthly fixed operating cost&quot;, &quot;PHP 20,000&quot;]]}}, {&quot;section&quot;: &quot;08 Three-Year Financial Projection&quot;, &quot;title&quot;: &quot;Financial Model Structure&quot;, &quot;body&quot;: [&quot;Assumptions sheet: editable base case values and notes.&quot;, &quot;Monthly projection: 36-month view for active providers, requests, completed jobs, GMV, revenue, expenses, and cash flow.&quot;, &quot;Annual summary: Year 1, Year 2, and Year 3 totals.&quot;, &quot;Unit economics: average job value, take rate, revenue per completed job, notification cost, and completion-rate logic.&quot;, &quot;Definition of Terms sheet: shared vocabulary for the model.&quot;]}, {&quot;section&quot;: &quot;08 Three-Year Financial Projection&quot;, &quot;title&quot;: &quot;Revenue and Cost Logic&quot;, &quot;body&quot;: [&quot;Phase 1 should remain free while validation and trust are being proven.&quot;, &quot;Future revenue may come from premium profiles, featured listings, lead credits, subscriptions, small commissions, ads, and business accounts.&quot;, &quot;Costs include hosting, domain, notifications, marketing, field recruitment, support, legal setup, payment processing, and development time.&quot;, &quot;The model is a planning tool, not a promise of results.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Field Forms Purpose&quot;, &quot;body&quot;: [&quot;The field forms are designed for validation and early operations.&quot;, &quot;They can be printed or copied into Google Forms and Google Sheets.&quot;, &quot;The goal is to collect real client, provider, request, job, and meeting data before full development.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Client Survey Form&quot;, &quot;body&quot;: [&quot;Name or nickname, barangay/area, age range.&quot;, &quot;Recent service need and how the client found the provider.&quot;, &quot;Time needed to find help and whether price was clear.&quot;, &quot;Confidence in provider, what went well, what was frustrating.&quot;, &quot;Willingness to use KAILA, categories likely used, willingness to rate provider, willingness to upload problem photos or videos.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Provider Signup Form&quot;, &quot;body&quot;: [&quot;Full name, display name, contact number, barangay/area.&quot;, &quot;Service categories, specific skills, years of experience.&quot;, &quot;Availability, emergency availability, coverage area.&quot;, &quot;Minimum service fee or price range.&quot;, &quot;Work photos, optional certificate or permit.&quot;, &quot;Willingness to be contacted for pilot requests, receive ratings, and submit ID for verified badge.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Provider Interview Notes&quot;, &quot;body&quot;: [&quot;How providers usually get clients and what problems they face getting jobs.&quot;, &quot;Most profitable services and jobs they avoid.&quot;, &quot;Response speed for urgent jobs and how they estimate price.&quot;, &quot;What would make them trust a platform like KAILA.&quot;, &quot;Concerns about ratings, ID verification, pricing, or client behavior.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Client Request Intake Form&quot;, &quot;body&quot;: [&quot;Client name or nickname and contact method.&quot;, &quot;Barangay/area and service category.&quot;, &quot;Problem description, urgency, budget range, preferred schedule.&quot;, &quot;Photos/videos attached.&quot;, &quot;Permission to forward request to matching providers.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Completed Job Log&quot;, &quot;body&quot;: [&quot;Request ID, client, provider, category.&quot;, &quot;Agreed amount.&quot;, &quot;Date posted, date accepted, date completed.&quot;, &quot;Client rating and provider rating.&quot;, &quot;Issue encountered, repeat client, and notes.&quot;]}, {&quot;section&quot;: &quot;09 Field Forms Pack&quot;, &quot;title&quot;: &quot;Founder Meeting Notes Template&quot;, &quot;body&quot;: [&quot;Date and attendees.&quot;, &quot;Decisions made.&quot;, &quot;Assumptions tested.&quot;, &quot;Metrics reviewed.&quot;, &quot;Problems found.&quot;, &quot;Next actions, owner per action, deadline, and open questions.&quot;]}, {&quot;section&quot;: &quot;Terms&quot;, &quot;title&quot;: &quot;Definition of Key Terms&quot;, &quot;table&quot;: {&quot;headers&quot;: [&quot;Term&quot;, &quot;Meaning&quot;], &quot;rows&quot;: [[&quot;KAILA&quot;, &quot;The proposed local services marketplace that helps clients find trusted local help and skilled workers become visible.&quot;], [&quot;Client&quot;, &quot;A person, household, business, or organization that posts a service need or hires a provider.&quot;], [&quot;Provider&quot;, &quot;A skilled worker, freelancer, technician, shop, or service professional offering work.&quot;], [&quot;Service Request&quot;, &quot;A client post describing job, location, budget, urgency, details, and optional files.&quot;], [&quot;Offer&quot;, &quot;A provider response with price, availability, scope notes, or schedule.&quot;], [&quot;Concierge Pilot&quot;, &quot;Manual marketplace test using forms, spreadsheets, Facebook, and Messenger before full app build.&quot;], [&quot;Go/No-Go Criteria&quot;, &quot;Evidence thresholds used to decide whether to proceed, narrow, redesign, or pause.&quot;]]}}, {&quot;type&quot;: &quot;closing&quot;, &quot;section&quot;: &quot;Closing&quot;, &quot;title&quot;: &quot;Founder Decision Point&quot;, &quot;body&quot;: [&quot;KAILA should be treated as a validation project first and software project second.&quot;, &quot;The next best move is a disciplined Gingoog City concierge pilot: recruit providers, collect requests, match manually, measure trust, and decide with evidence.&quot;, &quot;If demand and provider response are strong, build the MVP around the proven workflow.&quot;]}]</script>
