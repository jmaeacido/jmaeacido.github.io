  <script id="slide-data" type="application/json">[
    {"type":"cover","section":"Startup Guide","title":"KAILA Right-Path Startup Guide","subtitle":"A practical guide for starting the first KAILA pilot the right way.","body":["Validation first. Provider supply first. Trust first. Software second.","Based on the KAILA Founder-Grade Package."]},
    {"section":"The Main Rule","title":"KAILA starts as a validation project before it becomes a software project.","body":["Do not build the full app first. Build proof first.","Risky path: full app -> no users -> wasted time.","Right path: manual pilot -> evidence -> focused MVP.","First proof needed: requests, provider offers, completed or strongly matched jobs, ratings, and manageable disputes."]},
    {"section":"Roadmap","title":"90-Day Starting Roadmap","body":["Days 1-7: Foundation.","Days 8-21: Recruit providers.","Days 22-30: Validate clients.","Days 31-75: Concierge pilot.","Days 76-90: Review decision.","Output: forms, sheets, provider rules, provider list, real requests, tracked offers, ratings, and go/no-go decision."]},
    {"section":"Phase 0","title":"Founder Alignment","body":["Agree on the operating philosophy before asking anyone to join.","KAILA is not just an app. It is a local trust and service-matching system.","Local first: start in one focused place, not everywhere.","Provider first: build supply before client demand.","Trust first: use trust levels instead of pretending all providers are equal.","Manual first: prove the workflow manually before building the product.","Free first: learn fast before charging."]},
    {"section":"Phase 1","title":"Define the First Pilot","body":["Keep the first version narrow enough to operate and measure.","Area: Gingoog City or selected barangay cluster.","Clients: households, renters, homeowners, students, and small businesses.","Providers: skilled workers, technicians, freelancers, and shops.","Duration: 30-45 days of active matching.","Pricing: free pilot for clients and providers.","Goal: learn fast without creating a heavy operation."]},
    {"section":"Categories","title":"Choose 5-8 Starting Categories","body":["Select practical, common, and manageable local services.","Appliance repair: urgent household need.","Plumbing: leaks and clogs.","Electrical: common but safety-sensitive.","Computer repair: students, offices, and homes.","Motorcycle repair: local mobility need.","Carpentry or maintenance: small repairs.","Cleaning or odd jobs: flexible supply.","Digital services: layouts, designs, and basic tech.","Avoid high-risk or hard-to-control services at the start."]},
    {"section":"Phase 2","title":"Build the Manual System","body":["Use simple tools first. Let the process teach the software.","Facebook Page: public presence.","Provider Form: supply intake.","Client Request Form: demand intake.","Provider Sheet: supply database.","Request Tracker: job evidence.","Messenger: manual matching.","This is the concierge pilot: manually doing what the app will later automate."]},
    {"section":"Phase 3","title":"Recruit Providers First","body":["Clients will only trust KAILA if relevant providers are already available.","Target: 50 providers across 5-8 categories.","Aim for 3-5 providers per request.","Recruitment channels: personal networks, Facebook groups, repair shops, hardware stores, motorcycle shops, community referrals, and provider-to-provider referrals.","Provider pitch must answer: Will this help me get clients? Is it free? Can I accept or decline? Can I control my price?"]},
    {"section":"Phase 4","title":"Make Trust Visible","body":["Do not present all providers as equally verified.","Level 1: Listed.","Level 2: Identity Verified.","Level 3: Work Verified.","Level 4: Top Rated.","Level 5: Certified or Business Verified.","Trust grows through identity checks, work samples, completed pilot jobs, ratings, response speed, and low dispute rate."]},
    {"section":"Phase 5","title":"Validate Client Demand","body":["Listen for repeated pain points before launching publicly.","Lisod mangita ug kasaligan: trust problem.","Walay klaro nga presyo: pricing problem.","Dugay mu-reply: response problem.","Referral ra gyud mi magsalig: informal discovery.","Wala ko kabalo kinsa duol: location discovery.","Target: 100 resident responses, or at least 30-50 strong responses before starting the first requests."]},
    {"section":"Phase 6","title":"Run the Concierge Pilot","body":["The first KAILA workflow should be manual, measurable, and repeatable.","Client request -> KAILA checks details -> forward to providers -> offers received -> client chooses -> job and ratings.","Record every step: time received, providers contacted, response time, offers, selected provider, agreed amount, completion, ratings, and issues."]},
    {"section":"Script","title":"Practical Matching Script","body":["Use a consistent request format so providers can respond quickly.","KAILA Request #001: Category: Plumbing. Area: Barangay 23, Gingoog City. Problem: clogged kitchen sink. Urgency: today. Budget: PHP 500-PHP 800.","Ask: Can you take this job? If yes, send your offer and available time.","Send to 3-5 matching providers.","Record who replies and how fast.","Let the client compare offers clearly.","Do not share unnecessary private details too early."]},
    {"section":"Phase 7","title":"Track the Right Metrics","body":["The pilot must be judged by evidence, not excitement.","Active providers: supply strength.","Requests: demand.","Response rate: provider seriousness.","Offers per request: market activity.","Completed jobs: actual value.","Ratings: trust.","Disputes: risk.","GMV: peso value of completed jobs through KAILA."]},
    {"section":"Phase 8","title":"Go / No-Go Decision","body":["After the pilot, choose the next move based on evidence.","Proceed to MVP: real requests, provider response, 15+ completed or strongly matched jobs, ratings accepted, and disputes manageable.","Narrow scope: only 1-2 categories work strongly, so focus on the winning categories instead of stopping.","Redesign or pause: providers refuse, clients avoid posting, trust barriers are too high, or operations cannot support matching.","Decision question: What does the data say?"]},
    {"section":"Phase 9","title":"Build MVP Only After Strong Signals","body":["The MVP should digitize the proven manual workflow.","Client: register, post request, compare offers, choose provider, confirm and rate.","Provider: create profile, view matching requests, send offer, update job, rate client.","Admin: manage users, verify providers, track jobs, handle disputes, view reports."]},
    {"section":"Scope","title":"Do Not Build These Yet","body":["Avoid heavy features before the core marketplace behavior is proven.","Do not build in-app payments yet.","Do not build GPS live tracking yet.","Do not build native mobile apps yet.","Do not build complex AI matching yet.","Do not build large-scale automation yet.","First prove: request posting -> provider offers -> client selection -> job completion -> ratings -> trust improvement."]},
    {"section":"Phase 10","title":"Monetize Slowly","body":["Do not charge until providers feel real value.","Step 1: Free pilot to build trust.","Step 2: Visibility products such as premium profiles or featured listings.","Step 3: Lead or transaction revenue through lead credits, subscriptions, or commission.","Recommended first paid product: provider visibility, not commission."]},
    {"section":"Team","title":"Founder Roles Must Be Clear","body":["Even if one person holds multiple roles, responsibilities should be named.","Product / Tech.","Provider Acquisition.","Operations.","Marketing / Community.","Finance / Admin.","Business Strategy.","KAILA Pilot Team."]},
    {"section":"Protection","title":"Protect KAILA Early","body":["Treat data, brand, provider records, and internal strategy carefully.","Provider list: limit access.","Client requests: share only needed details.","Photos and videos: ask permission before posting.","Ratings and disputes: keep factual records.","Brand and documents: organize source files.","Code: clarify ownership.","Trust can be damaged by poor data handling before the app even exists."]},
    {"section":"Rhythm","title":"Weekly Operating Rhythm","body":["Review evidence, improve the workflow, and assign next actions.","Track providers joined, active providers, client requests, top categories, response time, offers per request, completed jobs, ratings, disputes, and next actions.","Weekly output: metrics summary, top lessons, problems found, assigned next actions, and decision notes."]},
    {"section":"Checklist","title":"First 7 Days: Exact Starter Checklist","body":["Start immediately without building the app.","Day 1: Pilot scope.","Day 2: Facebook page.","Day 3: Provider form and sheet.","Day 4: Client form and tracker.","Day 5: Rules and scripts.","Day 6: 100 provider leads.","Day 7: Start outreach.","Week 1 is successful if KAILA can be explained clearly, collect signups, receive requests, and track everything."]},
    {"type":"closing","section":"Recommended First Move","title":"KAILA Gingoog Concierge Pilot","body":["50 providers.","100 client responses.","30 real requests.","15 completed or strongly matched jobs.","5-8 categories.","30-45 active matching days.","If the pilot shows strong behavior and trust, build the MVP around the proven workflow."]}
